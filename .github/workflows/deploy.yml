name: Build and Deploy Blazor WebAssembly

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Publish Blazor WebAssembly
        run: dotnet publish AISnakeGame.csproj -c Release -o publish

      - name: Verify _framework directory
        run: |
          echo "Contents of publish/wwwroot/_framework:"
          ls -la publish/wwwroot/_framework/ || echo "_framework directory not found!"
          echo ""
          echo "Looking for blazor.webassembly.js:"
          find publish/wwwroot/_framework -name "*blazor*" -type f || echo "No blazor files found!"

      - name: Prepare deployment
        run: |
          mkdir -p build
          cp -r publish/wwwroot/* build/
          
          # Ensure _framework directory is copied
          if [ -d "publish/wwwroot/_framework" ]; then
            cp -r publish/wwwroot/_framework build/
          fi
          
          # Create .nojekyll to disable Jekyll processing
          touch build/.nojekyll

          # Explicitly set base href for AISnakeGame subfolder
          sed -i 's/<base href="\/" \/>/<base href="\/AISnakeGame\/" \/>/g' build/index.html

          # Support client-side routing fallback
          cp build/index.html build/404.html
          
          # Verify what we're deploying
          echo "Build directory contents:"
          ls -la build/
          echo ""
          echo "Build/_framework directory:"
          ls -la build/_framework/ 2>/dev/null || echo "_framework not in build!"

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
          branch: gh-pages
          clean: true
          single-commit: true
