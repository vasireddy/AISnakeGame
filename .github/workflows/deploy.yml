name: Build and Deploy
on: [push]
permissions:
  contents: write
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install and Build 🔧
        run: |
          dotnet publish AISnakeStudio.csproj -c Release -o publish
          mkdir build
          cp -r publish/wwwroot/* build/
          touch build/.nojekyll

          # Fix base href for GitHub Pages subfolder
          # We use a more robust sed pattern
          sed -i 's/<base href="\/" \/>/<base href="\/AISnakeGame\/" \/>/g' build/index.html

          # Copy index.html to 404.html to handle client-side routing on GitHub Pages
          cp build/index.html build/404.html

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # The folder the action should deploy.
