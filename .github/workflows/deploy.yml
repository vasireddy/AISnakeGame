name: Build and Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install dependencies
        run: dotnet restore

      - name: Build 🔧
        run: dotnet build -c Release --no-restore

      - name: Publish 📦
        run: dotnet publish AISnakeStudio.csproj -c Release -o publish

      - name: Prepare deployment 📁
        run: |
          mkdir build
          cp -r publish/wwwroot/* build/
          touch build/.nojekyll

          # Fix base href for GitHub Pages subfolder
          sed -i 's/<base href="\/" \/>/<base href="\/AISnakeGame\/" \/>/g' build/index.html

          # Copy index.html to 404.html to handle client-side routing on GitHub Pages
          cp build/index.html build/404.html

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true